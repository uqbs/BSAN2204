<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Directory Listing</title>
  <meta name="description" content="Lists files and groups them by Lectures and Tutorials." />
  <style>
    :root{ color-scheme: light dark; }
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      line-height:1.6; padding:24px; max-width:860px; margin-inline:auto;
    }
    h1{ font-size:clamp(20px,3vw,28px); margin:0 0 12px; }
    h2{ font-size:clamp(18px,2.5vw,22px); margin:24px 0 8px; }
    p.hint{ margin:0 0 16px; color:#64748b; }
    ul{ list-style:none; padding:0; margin:0; }
    li{
      border:1px solid rgba(148,163,184,.3); border-radius:10px; padding:10px 12px; margin:8px 0;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    a{ text-decoration:none; color:inherit; }
    .name{ display:flex; align-items:center; gap:10px; min-width:0; }
    .name .icon{ font-size:18px; }
    .name .text{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .meta{ color:#64748b; font-size:14px; }
    .error{ color:#b91c1c; }
    section + section{ margin-top: 20px; }
    .section-wrap { margin-top: 24px; }
    .visually-hidden{ position:absolute !important; height:1px; width:1px; overflow:hidden; clip:rect(1px, 1px, 1px, 1px); white-space:nowrap; }
    noscript p { color:#b45309; background:rgba(250,204,21,.15); border:1px solid rgba(245,158,11,.3); padding:8px 12px; border-radius:8px; }
  </style>
</head>
<body>
  <h1>Files in this directory</h1>
  <p id="status" class="hint">Loading…</p>

  <noscript>
    <p>JavaScript is disabled. Enable it to auto‑list files (or add manual links).</p>
  </noscript>

  <div class="section-wrap">
    <section id="lectures" aria-labelledby="lectures-heading" style="display:none;">
      <h2 id="lectures-heading">Lectures</h2>
      <ul id="lectures-list"></ul>
    </section>

    <section id="tutorials" aria-labelledby="tutorials-heading" style="display:none;">
      <h2 id="tutorials-heading">Tutorials</h2>
      <ul id="tutorials-list"></ul>
    </section>

    <section id="others" aria-labelledby="others-heading" style="display:none;">
      <h2 id="others-heading">Other files</h2>
      <ul id="others-list"></ul>
    </section>
  </div>

  <!-- ====== CONFIG (choose one approach) ====== -->
  <script>
    // OPTION A: GitHub Pages (auto-list via GitHub API)
    // Fill these in if your site is on GitHub Pages.
    // Leave owner/repo empty to skip GitHub and use files.json instead.
    window.REPO = {
      provider: 'github',
      owner: '',          // e.g. 'thomasmagor'
      repo: '',           // e.g. 'marketing-101'
      path: '',           // optional: subfolder inside repo, '' for root
      branch: 'main'      // optional
    };

    // OPTION B: Manifest file (works on any host)
    // Create a files.json in the same folder as index.html (see sample below).
    // The script will automatically fall back to files.json if GitHub config is blank or fails.
  </script>

  <script>
    (function () {
      const statusEl = document.getElementById('status');
      const lecturesEl = document.getElementById('lectures');
      const tutorialsEl = document.getElementById('tutorials');
      const othersEl = document.getElementById('others');
      const lecturesList = document.getElementById('lectures-list');
      const tutorialsList = document.getElementById('tutorials-list');
      const othersList = document.getElementById('others-list');

      // Matchers: start with Lecture_ or Tutorial_ (case-insensitive)
      const lectureRe = /^lecture_/i;
      const tutorialRe = /^tutorial_/i;

      // Exclude noise files if present
      const EXCLUDE = new Set(['index.html','files.json','.ds_store']);

      function show(el, on) { el.style.display = on ? '' : 'none'; }

      function addItem(targetList, { name, href, size }, icon) {
        const li = document.createElement('li');

        const nameSpan = document.createElement('span');
        nameSpan.className = 'name';

        const iconSpan = document.createElement('span');
        iconSpan.className = 'icon';
        iconSpan.textContent = icon;

        const link = document.createElement('a');
        link.className = 'text';
        link.href = href || name;
        link.textContent = name;

        nameSpan.append(iconSpan, link);
        li.appendChild(nameSpan);

        if (size) {
          const meta = document.createElement('span');
          meta.className = 'meta';
          meta.textContent = prettySize(size);
          li.appendChild(meta);
        }

        targetList.appendChild(li);
      }

      function prettySize(bytes) {
        if (typeof bytes !== 'number') return '';
        const units = ['B','KB','MB','GB'];
        let i = 0;
        while (bytes >= 1024 && i < units.length-1) { bytes /= 1024; i++; }
        return `${bytes.toFixed(bytes < 10 && i ? 1 : 0)} ${units[i]}`;
      }

      function categorize(files) {
        let lec = 0, tut = 0, oth = 0;

        files
          .filter(f => f && f.name && !EXCLUDE.has(f.name.toLowerCase()))
          .sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true, sensitivity:'base'}))
          .forEach(f => {
            const key = f.name.toLowerCase();
            if (lectureRe.test(key)) {
              addItem(lecturesList, f, '🎓'); lec++;
            } else if (tutorialRe.test(key)) {
              addItem(tutorialsList, f, '🧩'); tut++;
            } else {
              addItem(othersList, f, '📄'); oth++;
            }
          });

        show(lecturesEl, lec > 0);
        show(tutorialsEl, tut > 0);
        show(othersEl, oth > 0);

        statusEl.textContent = (lec + tut + oth) ? 'Grouped by category.' : 'No files found.';
      }

      async function fetchFromGitHub(cfg) {
        if (!cfg || !cfg.owner || !cfg.repo) return null;
        const base = `https://api.github.com/repos/${encodeURIComponent(cfg.owner)}/${encodeURIComponent(cfg.repo)}/contents/`;
        const url = cfg.path ? base + encodeURIComponent(cfg.path).replace(/%2F/g,'/') : base;

        const res = await fetch(url, { headers: { 'Accept': 'application/vnd.github+json' }});
        if (!res.ok) throw new Error(`GitHub API ${res.status}`);
        const data = await res.json();

        // Map API response to {name, href, size}
        return data
          .filter(item => item.type === 'file')
          .map(item => ({ name: item.name, href: item.download_url || item.html_url, size: item.size }));
      }

      async function fetchFromManifest() {
        const res = await fetch('./files.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('files.json not found');
        const arr = await res.json();
        // Support either array of strings or array of objects
        return arr.map(x => typeof x === 'string' ? ({ name: x, href: x }) : x);
      }

      async function run() {
        statusEl.textContent = 'Loading…';

        // Try GitHub first (if configured), then fallback to files.json
        try {
          const ghFiles = await fetchFromGitHub(window.REPO);
          if (ghFiles && ghFiles.length) {
            categorize(ghFiles);
            return;
          }
        } catch (e) {
          // fall through to manifest
        }

        try {
          const mfFiles = await fetchFromManifest();
          categorize(mfFiles);
          return;
        } catch (e) {
          statusEl.textContent = 'Ready. Add files.json or configure GitHub repo.';
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', run);
      } else {
        run();
      }
    })();
  </script>
</body>
</html>
