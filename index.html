<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Directory Listing</title>
  <meta name="description" content="Lists files in the repository root." />
  <style>
    :root{ color-scheme: light dark; }
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      line-height:1.6; padding:24px; max-width:860px; margin-inline:auto;
    }
    h1{ font-size:clamp(20px,3vw,28px); margin:0 0 12px; }
    h2{ font-size:clamp(18px,2.5vw,22px); margin:24px 0 8px; }
    p.hint{ margin:0 0 16px; color:#64748b; }
    ul{ list-style:none; padding:0; margin:0; }
    li{
      border:1px solid rgba(148,163,184,.3); border-radius:10px; padding:10px 12px; margin:8px 0;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    a{ text-decoration:none; color:inherit; }
    .name{ display:flex; align-items:center; gap:10px; min-width:0; }
    .name .icon{ font-size:18px; }
    .name .text{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .meta{ color:#64748b; font-size:14px; }
    .error{ color:#b91c1c; }

    /* Subtle section separation */
    section + section{ margin-top: 20px; }
    .section-wrap { margin-top: 24px; }
    .visually-hidden{ position:absolute !important; height:1px; width:1px; overflow:hidden; clip:rect(1px, 1px, 1px, 1px); white-space:nowrap; }
  </style>
</head>
<body>
  <h1>Files in this directory</h1>
  <p id="status" class="hint">Loading…</p>

  <!-- ---- OPTIONAL: If your indexer prints a flat list, place it here ---- -->
  <!-- The script will read items from #all-files and redistribute them into sections. -->
  <ul id="all-files" aria-label="All files (source list for auto-grouping)">
    <!-- Example structure expected (your generator likely matches this):
    <li>
      <span class="name">
        <span class="icon">📄</span>
        Lecture01-Intro.pdfLecture01-Intro.pdf</a>
      </span>
      <span class="meta">12 KB</span>
    </li>
    -->
  </ul>

  <div class="section-wrap">
    <!-- Lectures Section -->
    <section id="lectures" aria-labelledby="lectures-heading">
      <h2 id="lectures-heading">Lectures</h2>
      <ul id="lectures-list"></ul>
      <!-- If you want to hardcode, add items like:
      <li>
        <span class="name">
          <span class="icon">🎓</span>
          lectures/lecture1.htmlLecture 1 – Introduction</a>
        </span>
        <span class="meta">HTML</span>
      </li>
      -->
    </section>

    <!-- Tutorials Section -->
    <section id="tutorials" aria-labelledby="tutorials-heading">
      <h2 id="tutorials-heading">Tutorials</h2>
      <ul id="tutorials-list"></ul>
    </section>

    <!-- Other files Section (fallback for non-lecture/tutorial content) -->
    <section id="others" aria-labelledby="others-heading">
      <h2 id="others-heading">Other files</h2>
      <ul id="others-list"></ul>
    </section>
  </div>

  <script>
    (function () {
      const statusEl = document.getElementById('status');
      const sourceList = document.getElementById('all-files');
      const lecturesList = document.getElementById('lectures-list');
      const tutorialsList = document.getElementById('tutorials-list');
      const othersList = document.getElementById('others-list');

      // Define matching rules (extend as needed)
      const isLecture = (name) => /\b(lecture|lec)\b|\bweek\s*\d+.*lecture/i.test(name) || /^lecture/i.test(name);
      const isTutorial = (name) => /\b(tutorial|tut|workshop|lab)\b/i.test(name) || /^tutorial/i.test(name);

      // Helper: clone a list item, preserving structure but changing icon if desired
      function cloneItem(li, iconEmoji) {
        const clone = li.cloneNode(true);
        // Try to swap icon for better semantics if there's an icon span
        const nameSpan = clone.querySelector('.name');
        if (nameSpan) {
          let iconSpan = nameSpan.querySelector('.icon');
          if (!iconSpan) {
            iconSpan = document.createElement('span');
            iconSpan.className = 'icon';
            nameSpan.prepend(iconSpan);
          }
          iconSpan.textContent = iconEmoji;
        }
        return clone;
      }

      function distribute() {
        const items = Array.from(sourceList.querySelectorAll(':scope > li'));
        let lecturesCount = 0, tutorialsCount = 0, othersCount = 0;

        items.forEach(li => {
          const anchor = li.querySelector('a');
          const text = (anchor?.textContent || '').trim();
          const href = (anchor?.getAttribute('href') || '').trim();
          const key = (text || href).toLowerCase();

          if (isLecture(key)) {
            lecturesList.appendChild(cloneItem(li, '🎓'));
            lecturesCount++;
          } else if (isTutorial(key)) {
            tutorialsList.appendChild(cloneItem(li, '🧩'));
            tutorialsCount++;
          } else {
            othersList.appendChild(cloneItem(li, '📄'));
            othersCount++;
          }
        });

        // Hide empty sections
        document.getElementById('lectures').style.display = lecturesCount ? '' : 'none';
        document.getElementById('tutorials').style.display = tutorialsCount ? '' : 'none';
        document.getElementById('others').style.display = othersCount ? '' : 'none';

        // If we successfully redistributed, we can optionally hide the source list
        if (items.length) {
          sourceList.classList.add('visually-hidden');
          statusEl.textContent = 'Grouped by category.';
        } else {
          statusEl.textContent = 'No files found.';
        }
      }

      // If your list is injected asynchronously by a generator, wait a bit
      const MAX_WAIT_MS = 1200;
      let waited = 0;

      function tryDistribute() {
        const hasItems = sourceList.querySelector('li');
        if (hasItems) {
          distribute();
        } else if (waited < MAX_WAIT_MS) {
          waited += 100;
          setTimeout(tryDistribute, 100);
        } else {
          statusEl.textContent = 'Ready. Add files to display.';
        }
      }

      // Kick off
      statusEl.textContent = 'Loading…';
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', tryDistribute);
      } else {
        tryDistribute();
      }
    })();
  </script>
</body>
</html>
