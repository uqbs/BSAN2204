<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Directory Listing</title>
  <meta name="description" content="Lists files in the repository root." />
  <style>
    :root{ color-scheme: light dark; }
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      line-height:1.6; padding:24px; max-width:860px; margin-inline:auto;
    }
    h1{ font-size:clamp(20px,3vw,28px); margin:0 0 12px; }
    p.hint{ margin:0 0 16px; color:#64748b; }
    ul{ list-style:none; padding:0; margin:0; }
    li{
      border:1px solid rgba(148,163,184,.3); border-radius:10px; padding:10px 12px; margin:8px 0;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    a{ text-decoration:none; color:inherit; }
    .name{ display:flex; align-items:center; gap:10px; min-width:0; }
    .name .icon{ font-size:18px; }
    .name .text{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .meta{ color:#64748b; font-size:14px; }
    .error{ color:#b91c1c; }
    .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
  </style>
</head>
<body>
  <h1>Files in this directory</h1>
  <p id="status" class="hint">Loading…</p>
  <ul id="files" aria-live="polite"></ul>

  <noscript>
    <p class="error">This page requires JavaScript to fetch the file list from the GitHub API.</p>
  </noscript>

  <script>
    (async () => {
      const statusEl = document.getElementById('status');
      const listEl = document.getElementById('files');

      // --- Configuration (override as needed) ---
      const CONFIG = {
        OWNER: '',        // e.g., 'octocat'  (leave blank to auto-detect on *.github.io)
        REPO: '',         // e.g., 'octocat.github.io' or 'my-project' (auto-detect when possible)
        BRANCH: 'main',   // 'main' or 'gh-pages' or as configured
        PATH: ''          // root directory
      };

      // Try to auto-detect owner/repo for GitHub Pages
      function autodetect() {
        const host = location.hostname;         // e.g., user.github.io or custom domain
        const parts = location.pathname.split('/').filter(Boolean);
        const info = { owner: CONFIG.OWNER, repo: CONFIG.REPO };

        if (!info.owner && host.endsWith('.github.io')) {
          info.owner = host.split('.')[0];
        }

        // Project page pattern: /REPO_NAME/...
        if (!info.repo) {
          if (info.owner && parts.length > 0) {
            info.repo = parts[0];
          } else if (info.owner) {
            // Likely a user/organization site
            info.repo = `${info.owner}.github.io`;
          }
        }
        return info;
      }

      const { owner, repo } = autodetect();

      if (!owner || !repo) {
        statusEl.className = 'error';
        statusEl.textContent = 'Could not detect repository. Set OWNER and REPO in the script config.';
        return;
      }

      // Build GitHub Contents API URL for the root
      const branch = CONFIG.BRANCH || 'main';
      const path = CONFIG.PATH ? `/${CONFIG.PATH.replace(/^\/|\/$/g, '')}` : '';
      const apiURL = `https://api.github.com/repos/${owner}/${repo}/contents${path}?ref=${encodeURIComponent(branch)}`;

      try {
        const res = await fetch(apiURL, { headers: { 'Accept': 'application/vnd.github+json' } });
        if (!res.ok) {
          throw new Error(`GitHub API error ${res.status}: ${await res.text()}`);
        }
        const items = await res.json();

        // Keep only files in root; hide this index.html to avoid self-link
        const files = (Array.isArray(items) ? items : [])
          .filter(i => i && i.type === 'file')
          .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }))
          .filter(i => i.name.toLowerCase() !== 'index.html');

        if (files.length === 0) {
          statusEl.textContent = 'No files found in the root directory.';
          return;
        }

        statusEl.textContent = `Found ${files.length} file${files.length > 1 ? 's' : ''}.`;
        const frag = document.createDocumentFragment();

        for (const f of files) {
          const li = document.createElement('li');

          const left = document.createElement('div');
          left.className = 'name';
          const icon = document.createElement('span');
          icon.className = 'icon';
          // lightweight mime-ish icon: emoji is fine here
          icon.textContent = '📄';
          const link = document.createElement('a');
          link.href = `${path}/${encodeURIComponent(f.name)}`.replace(/\/\//g, '/');
          link.className = 'text';
          link.textContent = f.name;
          link.setAttribute('title', f.name);
          left.append(icon, link);

          const right = document.createElement('div');
          right.className = 'meta';
          right.textContent = humanSize(f.size);

          li.append(left, right);
          frag.appendChild(li);
        }

        listEl.appendChild(frag);
      } catch (err) {
        console.error(err);
        statusEl.className = 'error';
        statusEl.textContent = 'Failed to load file list. If this is a custom domain, set OWNER and REPO in the config.';
      }

      function humanSize(bytes) {
        if (bytes === 0) return '0 B';
        const units = ['B','KB','MB','GB','TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(1024));
        return `${(bytes / Math.pow(1024, i)).toFixed(i ? 1 : 0)} ${units[i]}`;
      }
    })();
  </script>
</body>
</html>
