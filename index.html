<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Directory Listing</title>
  <meta name="description" content="Lists files in the repository root." />
  <style>
    :root{ color-scheme: light dark; }
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      line-height:1.6; padding:24px; max-width:860px; margin-inline:auto;
    }
    h1{ font-size:clamp(20px,3vw,28px); margin:0 0 12px; }
    h2{ font-size:clamp(18px,2.5vw,22px); margin:24px 0 8px; }
    p.hint{ margin:0 0 16px; color:#64748b; }
    ul{ list-style:none; padding:0; margin:0; }
    li{
      border:1px solid rgba(148,163,184,.3); border-radius:10px; padding:10px 12px; margin:8px 0;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    a{ text-decoration:none; color:inherit; }
    .name{ display:flex; align-items:center; gap:10px; min-width:0; }
    .name .icon{ font-size:18px; }
    .name .text{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .meta{ color:#64748b; font-size:14px; }
    .error{ color:#b91c1c; }
    section + section{ margin-top: 20px; }
    .section-wrap { margin-top: 24px; }
    .visually-hidden{ position:absolute !important; height:1px; width:1px; overflow:hidden; clip:rect(1px, 1px, 1px, 1px); white-space:nowrap; }
    noscript p { color:#b45309; background:rgba(250,204,21,.15); border:1px solid rgba(245,158,11,.3); padding:8px 12px; border-radius:8px; }
  </style>
</head>
<body>
  <h1>Files in this directory</h1>
  <p id="status" class="hint">Loading…</p>

  <noscript>
    <p>JavaScript is disabled. Files will not be grouped automatically. Enable JavaScript or manually organize your links below.</p>
  </noscript>

  <!-- SOURCE LIST (optional if your indexer prints a flat list here) -->
  <!-- The script will read items from #all-files and redistribute them into sections. -->
  <ul id="all-files" aria-label="All files (source list for auto-grouping)">
    <!-- Example structure (your generator likely matches this):
    <li>
      <span class="name">
        <span class="icon">📄</span>
        <a class="text" href="Lecture1-Intro.pdf</a>
      </span>
      <span class="meta">PDF · 1.2 MB</span>
    </li>
    <li>
      <span class="name">
        <span class="icon">📄</span>
        materials/Tutorial_02.htmlTutorial_02.html</a>
      </span>
      <span class="meta">HTML</span>
    </li>
    <li>
      <span class="name">
        <span class="icon">📄</span>
        Syllabus.pdfSyllabus.pdf</a>
      </span>
      <span class="meta">PDF</span>
    </li>
    -->
  </ul>

  <div class="section-wrap">
    <!-- Lectures Section -->
    <section id="lectures" aria-labelledby="lectures-heading">
      <h2 id="lectures-heading">Lectures</h2>
      <ul id="lectures-list"></ul>
    </section>

    <!-- Tutorials Section -->
    <section id="tutorials" aria-labelledby="tutorials-heading">
      <h2 id="tutorials-heading">Tutorials</h2>
      <ul id="tutorials-list"></ul>
    </section>

    <!-- Other files Section -->
    <section id="others" aria-labelledby="others-heading">
      <h2 id="others-heading">Other files</h2>
      <ul id="others-list"></ul>
    </section>
  </div>

  <script>
    (function () {
      const statusEl = document.getElementById('status');
      const sourceList = document.getElementById('all-files');
      const lecturesList = document.getElementById('lectures-list');
      const tutorialsList = document.getElementById('tutorials-list');
      const othersList = document.getElementById('others-list');

      // Matchers: files that START with "Lecture_" or "Tutorial_" (case-insensitive)
      // If you later allow hyphens as well, use /^lecture[_-]/i and /^tutorial[_-]/i
      const lectureRe = /^lecture_/i;
      const tutorialRe = /^tutorial_/i;

      // Extract a clean filename key from <a href> (basename), fallback to text
      function getFileKey(anchor) {
        const href = (anchor?.getAttribute('href') || '').trim();
        const text = (anchor?.textContent || '').trim();
        const raw = href || text || '';
        try {
          const noHash = raw.split('#')[0].split('?')[0];
          const parts = noHash.split('/');
          const basename = parts[parts.length - 1] || noHash;
          return decodeURIComponent(basename).toLowerCase();
        } catch {
          return raw.toLowerCase();
        }
      }

      function isLecture(key) { return lectureRe.test(key); }
      function isTutorial(key) { return tutorialRe.test(key); }

      // Clone an <li>, optionally add/swap an icon
      function cloneItem(li, iconEmoji) {
        const clone = li.cloneNode(true);
        const nameSpan = clone.querySelector('.name') || clone;
        let iconSpan = clone.querySelector('.icon');
        if (!iconSpan) {
          iconSpan = document.createElement('span');
          iconSpan.className = 'icon';
          nameSpan.prepend(iconSpan);
        }
        iconSpan.textContent = iconEmoji;
        return clone;
      }

      function distributeFromList(listEl) {
        const items = Array.from(listEl.querySelectorAll(':scope > li'));
        let lecturesCount = 0, tutorialsCount = 0, othersCount = 0;

        items.forEach(li => {
          const anchor = li.querySelector('a');
          const key = getFileKey(anchor);
          if (!key) return;

          if (isLecture(key)) {
            lecturesList.appendChild(cloneItem(li, '🎓')); lecturesCount++;
          } else if (isTutorial(key)) {
            tutorialsList.appendChild(cloneItem(li, '🧩')); tutorialsCount++;
          } else {
            othersList.appendChild(cloneItem(li, '📄')); othersCount++;
          }
        });

        // Hide empty sections
        document.getElementById('lectures').style.display = lecturesCount ? '' : 'none';
        document.getElementById('tutorials').style.display = tutorialsCount ? '' : 'none';
        document.getElementById('others').style.display = othersCount ? '' : 'none';

        // Hide the source list if it was only for feeding
        if (items.length) listEl.classList.add('visually-hidden');

        return (lecturesCount + tutorialsCount + othersCount) > 0;
      }

      function distribute() {
        let populated = false;

        // Preferred: if you have a flat index list in #all-files
        if (sourceList) {
          const hasItems = sourceList.querySelector('li');
          if (hasItems) {
            populated = distributeFromList(sourceList);
          }
        }

        // Fallback: scan any top-level lists on the page if #all-files is empty/unused
        if (!populated) {
          const candidateLists = Array
            .from(document.querySelectorAll('ul'))
            .filter(ul => !['lectures-list','tutorials-list','others-list','all-files'].includes(ul.id));
          for (const ul of candidateLists) {
            if (ul.querySelector('li a')) {
              populated = distributeFromList(ul) || populated;
            }
          }
        }

        statusEl.textContent = populated ? 'Grouped by category.' : 'No files found.';
      }

      // Handle async injection (e.g., static site generators or client-side fetch)
      const MAX_WAIT_MS = 2000;
      let waited = 0;

      function tryDistribute() {
        const hasSourceItems = sourceList?.querySelector('li');
        const hasAnyItems = hasSourceItems || document.querySelector('ul li a');
        if (hasAnyItems) {
          distribute();
        } else if (waited < MAX_WAIT_MS) {
          waited += 100;
          setTimeout(tryDistribute, 100);
        } else {
          statusEl.textContent = 'Ready. Add files to display.';
        }
      }

      statusEl.textContent = 'Loading…';
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', tryDistribute);
      } else {
        tryDistribute();
      }
    })();
  </script>
</body>
</html>
